services:
  nextcloud:
    container_name: nextcloud
    image: nextcloud:stable
    ports:
      - 8080:80
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: "localhost:8080"
      REDIS_HOST: nextcloud-redis
    volumes:
      - ./volumes/nextcloud/html:/var/www/html
      - ./volumes/nextcloud/data:/var/www/html/data
    depends_on:
      - nextcloud-db
      - nextcloud-redis    
    labels:
      kuma.nextcloud.http.name: "Nextcloud"
      kuma.nextcloud.http.url: "http://nextcloud:80"
    restart: always

  nextcloud-db:
    container_name: nextcloud-db
    image: mariadb:lts
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: ${NEXTCLOUD_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ./volumes/nextcloud-db:/var/lib/mysql
    restart: always

  nextcloud-redis:
    container_name: nextcloud-redis
    image: redis:alpine
    volumes:
      - ./volumes/nextcloud-redis:/data
    restart: always

networks:
  default:
    name: homebase
